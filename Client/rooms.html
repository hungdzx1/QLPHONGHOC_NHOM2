<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rooms</title>
    <link rel="stylesheet" href="./css/rooms.css" />
</head>

<body>
  <header class="header">
    <div class="brand">
      <div class="mark">A</div>
      <div class="name">
      </div>
    </div>

    <div class="profile" aria-label="Tài khoản">
      <div class="avatar" title="Avatar"><img src="./img/avt.jpg"></div>
      <div class="meta">
        <b id="fullname"></b>
        <span></span>
      </div>
      <div class="caret" aria-hidden="true"></div>

      <div class="dropdown" role="menu">

        <button class="logout" id="btnChangePassword" type="button"> 
          <span class="tag">Đổi mật khẩu</span>
        </button>

        <button class="logout" id="btnLogout" type="button">
          <span class="tag">Đăng Xuất</span>
        </button>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="nav-title">Menu</div>
      <nav class="nav" id="nav">
        <a href="/admin.html"><span class="icon">🏠</span>Home</a>
        <a href="/rooms.html" class="active"><span class="icon">➕</span>Quản lí phòng</a>
        <a href="/ql-taikhoan.html"><span class="icon">👤</span>Quản lí tài khoản</a>
        <a href="/admin-duyet-phong.html"><span class="icon">✅</span>Duyệt phòng</a>
      </nav>
    </aside>

    <main class="main">
      <div class="searching">
        <form action="" method="GET">
            <input type="text" name="name" id="searchInput" placeholder="Tìm kiếm phòng...(VD: A7-102)">
            <button type="submit" id="btnSearch">Tìm kiếm</button>
        </form>
      </div>

      <div class="add-rooms">
        <button class="btnall" id="btnAddRoom">
            <span class="icon">➕</span>
            Thêm phòng mới
        </button>
      </div>

      <div class="box-rooms">

        <div id="loading" class="loading">
          <div class="spinner"></div>
        </div>

      </div>


      <div class="edit-rooms">

      </div>

      

    </main>
  </div>
    <script src="./script/CheckLogin.js"></script>
    <script src="./script/Auth.js"></script>
    <script defer src="./script/rooms.js"></script>
</body>
</html>
