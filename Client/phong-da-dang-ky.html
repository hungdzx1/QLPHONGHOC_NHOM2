<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
    <link rel="stylesheet" href="./css/rooms.css" />
</head>

<body>
  <header class="header">
    <div class="brand">
      <div class="mark">U</div>
      <div class="name">
        <!-- <b>User Panel</b> -->
        <span>Dashboard</span>
      </div>
    </div>

    <div class="profile" aria-label="Tài khoản">
      <div class="avatar" title="Avatar"><img src="./img/avt.jpg"></div>
      <div class="meta">
        <b id="fullname"></b>
        <span></span>
      </div>
      <div class="caret" aria-hidden="true"></div>

      <div class="dropdown" role="menu">

        <button class="logout" id="btnChangePassword" type="button"> 
          <span class="tag">Đổi mật khẩu</span>
        </button>

        <button class="logout" id="btnLogout" type="button">
          <span class="tag">Đăng Xuất</span>
        </button>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="nav-title">Menu</div>
      <nav class="nav" id="nav">
        <a href="/home.html"><span class="icon">🏠</span>Trang chủ</a>
        <a href="/phong-da-dang-ky.html"  class="active"><span class="icon">✅</span>Lịch sử</a>
      </nav>
    </aside>

    <main class="main">
        
      <div class="navbar">
        <ul>
          <li><a href="#choduyet" id="pending" class="active">Chờ duyệt</a></li>
          <li><a href="#daduyet" id="approved">Đã duyệt</a></li>
          <li><a href="#tuchoi" id="rejected">Từ chối</a></li>
          <li><a href="#dahuy" id="cancelled">Đã hủy</a></li>
        </ul>
      </div>
    
        <div class="box-rooms">
    
            <h3>CHƯA ĐĂNG KÝ MƯỢN PHÒNG NÀO</h3>
    
        </div>
    </main>
  </div>

    <script src="./script/CheckLogin.js"></script>
    <script src="./script/Auth.js"></script>
    <script defer src="./script/phong-da-dang-ky.js"></script>
</body>
</html>
