<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
    <link rel="stylesheet" href="./css/rooms.css" />
</head>

<body>
  <header class="header">
    <div class="brand">
      <div class="mark">U</div>
      <div class="name">
        <!-- <b>User Panel</b> -->
        <span>Dashboard</span>
      </div>
    </div>

    <div class="profile" aria-label="Tài khoản">
      <div class="avatar" title="Avatar">TP</div>
      <div class="meta">
        <b id="fullname"></b>
        <span></span>
      </div>
      <div class="caret" aria-hidden="true"></div>

      <div class="dropdown" role="menu">
        <button class="logout" id="btnLogout" type="button">
          <span class="tag">Đăng Xuất</span>
        </button>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="nav-title">Menu</div>
      <nav class="nav" id="nav">
        <a href="/home.html"><span class="icon">🏠</span>Trang chủ</a>
        <a href="/phong-da-dang-ky.html"  class="active"><span class="icon">✅</span>Lịch sử</a>
      </nav>
    </aside>

    <main class="main">
        <div class="searching">
            <form action="" method="GET">
                <input type="text" name="name" id="searchInput" placeholder="Tìm kiếm phòng...(VD: A7-102)">
                <button type="submit" id="btnSearch">Tìm kiếm</button>
            </form>
        </div>
    
        <div class="box-rooms">
    
            <div class="rooms">
                <h3>Phòng A7-102</h3>
                <p>Loại phòng: Phòng học</p>
                <p>Ca: 1 (6h45-9h30)</p>
                <p>Ngày: 8/3/2026 </p>
                <p class="status cancelled" id="status">Trạng thái: Đã hủy</p>
                <button class="btn-xoa" id="btn-xoa">Hủy</button>
            </div>
    
        </div>
    </main>
  </div>

    <script src="./script/CheckLogin.js"></script>
    <script src="./script/Auth.js"></script>
    <script defer src="./script/phong-da-dang-ky.js"></script>
</body>
</html>
