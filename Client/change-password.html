<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sửa Thông Tin Phòng</title>
    <link rel="stylesheet" href="./css/rooms.css" />
</head>

<body>
  <header class="header">
    <div class="brand">
      <div class="mark"></div>
      <div class="name">
      </div>
    </div>

    <div class="profile" aria-label="Tài khoản">
      <div class="avatar" title="Avatar"><img src="./img/avt.jpg"></div>
      <div class="meta">
        <b id="fullname"></b>
      </div>
      <div class="caret" aria-hidden="true"></div>

      <div class="dropdown" role="menu">

        <button class="logout" id="btnChangePassword" type="button"> 
          <span class="tag">Đổi mật khẩu</span>
        </button>

        <button class="logout" id="btnLogout" type="button">
          <span class="tag">Đăng Xuất</span>
        </button>
      </div>
    </div>
  </header>

  <div class="change-password">
    <div class="edit-password">
      <h2>Đổi mật khẩu</h2>
      <form id="editPasswordForm" method="POST">
        <label for="password">Mật khẩu hiện tại: </label>
        <input type="password" id="password" name="password" placeholder="VD: 12345678">
  
        <label for="new_password">Nhập mật khẩu mới: </label>
        <input type="password" id="new_password" name="new_password" >
  
        <label for="new_password_confirm">Nhập lại mật khẩu mới: </label>
        <input type="password" id="new_password_confirm" name="new_password_confirm">
  
        <button type="submit" class="btn-save" id="btnChangePass">
          Cập Nhật
        </button>
      </form>
    </div>
  </div>


  <script src="./script/CheckLogin.js"></script>
  <script src="./script/Auth.js"></script>
  <script  src="./script/change-password.js"></script>


</body>
</html>
