<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sửa Thông Tin Phòng</title>
    <link rel="stylesheet" href="./css/rooms.css" />
</head>

<body>
  <header class="header">
    <div class="brand">
      <div class="mark">A</div>
      <div class="name">
      </div>
    </div>

    <div class="profile" aria-label="Tài khoản">
      <div class="avatar" title="Avatar">TP</div>
      <div class="meta">
        <b>Admin</b>
        <span></span>
      </div>
      <div class="caret" aria-hidden="true"></div>

      <div class="dropdown" role="menu">
        <button class="logout" id="btnLogout" type="button">
          <span class="tag">Đăng Xuất</span>
        </button>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="nav-title">Menu</div>
      <nav class="nav" id="nav">
        <a href="/admin.html"><span class="icon">🏠</span>Home</a>
        <a href="/rooms.html" class="active"><span class="icon">➕</span>Quản lí phòng</a>
        <a href="#"><span class="icon">👤</span>Quản lí tài khoản</a>
        <a href="#"><span class="icon">✅</span>Duyệt phòng</a>
      </nav>
    </aside>

    <main class="main">
      <div class="searching">
        <form action="" method="GET">
            <input type="text" name="name" id="searchInput" placeholder="Tìm kiếm phòng...(VD: A7-102)">
            <button type="submit" id="btnSearch">Tìm kiếm</button>
        </form>
      </div>

      <div class="box-rooms">

        <!-- <div class="rooms">
          <h3>Phòng A7-102</h3>
          <p>Loại phòng: Phòng học</p>
          <p>Sức chứa: 40 người</p>
          <p>Trạng thái: Đang sử dụng</p>
          <button class="btn-edit">Sửa</button>
          <button class="btn-delete">Xóa</button>
        </div>

      </div> -->

      <div class="edit-rooms">
        <h3>Sửa thông tin phòng A7-102</h3>
        <form action="" method="POST">
            <label for="roomName">Tên phòng:</label>
            <input type="text" id="roomName" name="roomName" value="A7-102" required>

            <label for="roomType">Loại phòng:</label>
            <select id="roomType" name="roomType" required>
                <option value="phong-hoc" selected>Phòng học</option>
                <option value="phong-hop">Phòng họp</option>
                <option value="phong-thi-nghiem">Phòng thí nghiệm</option>
            </select>

            <label for="capacity">Sức chứa:</label>
            <input type="number" id="capacity" name="capacity" value="40" min="1" required>

            <label for="status">Trạng thái:</label>
            <select id="status" name="status" required>
                <option value="1" selected>Đang sử dụng</option>
                <option value="0">Đang sửa chữa</option>
            </select>

            <button type="submit" class="btn-save">Lưu thay đổi</button>
        </form>
      </div>

      <div class="add-rooms">
        <button class="btnall">
            <span class="icon">➕</span>
            Thêm phòng mới
        </button>
      </div>

    </main>
  </div>
    <script src="./script/CheckLogin.js"></script>
    <script defer src="./script/rooms.js"></script>
</body>
</html>
