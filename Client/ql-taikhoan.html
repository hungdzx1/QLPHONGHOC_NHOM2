<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý tài khoản</title>
    <link rel="stylesheet" href="./css/ql-taikhoan.css" />
</head>

<body>
  <header class="header">
    <div class="brand">
      <div class="mark">A</div>
      <div class="name">
      </div>
    </div>

    <div class="profile" aria-label="Tài khoản">
      <div class="avatar" title="Avatar"><img src="./img/avt.jpg"></div>
      <div class="meta">
        <b id="fullname"></b>
        <span></span>
      </div>
      <div class="caret" aria-hidden="true"></div>

      <div class="dropdown" role="menu">

        <button class="logout" id="btnChangePassword" type="button"> 
          <span class="tag">Đổi mật khẩu</span>
        </button>

        <button class="logout" id="btnLogout" type="button">
          <span class="tag">Đăng Xuất</span>
        </button>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="nav-title">Menu</div>
      <nav class="nav" id="nav">
        <a href="/admin.html"><span class="icon">🏠</span>Home</a>
        <a href="/rooms.html"><span class="icon">➕</span>Quản lí phòng</a>
        <a href="/ql-taikhoan.html" class="active"><span class="icon">👤</span>Quản lí tài khoản</a>
        <a href="/admin-duyet-phong.html"><span class="icon">✅</span>Duyệt phòng</a>
      </nav>
    </aside>

    <main class="main">
      <div class="searching">
        <form action="" method="GET">
            <input type="text" name="username" id="searchInput" placeholder="Tìm kiếm tài khoản theo username...(VD: admin)">
            <button type="submit" id="btnSearch">Tìm kiếm</button>
        </form>
      </div>
    
      <div class="table-container">
        <h2>Danh sách tài khoản hiện có</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody>
            
          </tbody>
        </table>
      
      </div>

      <div class="edit-rooms">
        
      </div>

      <div class="add-rooms">
        <button class="btnall" id="btnAddAccount">
            <span class="icon">➕</span>
            Thêm tài khoản mới
        </button>
      </div>

    </main>
  </div>
    <script src="./script/CheckLogin.js"></script>
    <script src="./script/Auth.js"></script>
    <script defer src="./script/ql-taikhoan.js"></script>
</body>
</html>
